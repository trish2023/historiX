<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HistoriX - Community</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🕰️</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Open+Sans:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        :root {
            --primary-color: #2c3e50;
            --secondary-color: #3498db;
            --accent-color: #e74c3c;
            --background-light: #ecf0f1;
            --text-color: #333;
            --white: #ffffff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            background-color: var(--background-light);
            color: var(--text-color);
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 30px;
            padding: 20px;
            background: var(--white);
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .page-header h1 {
            font-family: 'Montserrat', sans-serif;
            color: var(--primary-color);
        }

        .post-form {
            background: var(--white);
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .post-form textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
            resize: none;
            height: 100px;
            font-family: 'Open Sans', sans-serif;
        }

        .button-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .file-input-label {
            background: var(--background-light);
            padding: 8px 16px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .file-input-label:hover {
            background: #ddd;
        }

        .file-input {
            display: none;
        }

        .submit-btn {
            background: var(--accent-color);
            color: var(--white);
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .submit-btn:hover {
            background: #c0392b;
        }

        .post {
            background: var(--white);
            border-radius: 10px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .post-header {
            padding: 15px;
            display: flex;
            align-items: center;
        }

        .avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: var(--secondary-color);
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--white);
            font-weight: bold;
        }

        .post-info {
            flex-grow: 1;
        }

        .username {
            font-weight: bold;
            color: var(--primary-color);
        }

        .timestamp {
            font-size: 0.85rem;
            color: #7f8c8d;
        }

        .post-content {
            padding: 0 15px 15px;
        }

        .post-image {
            width: 100%;
            max-height: 500px;
            object-fit: cover;
            margin: 10px 0;
            border-radius: 5px;
        }

        .post-actions {
            padding: 15px;
            border-top: 1px solid #eee;
            display: flex;
            gap: 20px;
        }

        .action-btn {
            background: none;
            border: none;
            color: #7f8c8d;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: color 0.3s ease;
        }

        .action-btn:hover {
            color: var(--accent-color);
        }

        .preview-image {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            display: none;
            border-radius: 5px;
        }

        main {
            padding: 20px 0;
        }
    </style>
</head>
<body>
    <header>
        <nav>
            <div class="logo">
                <h1>HistoriX</h1>
                <p>Exploring the Tapestry of Human History</p>
            </div>
            <ul class="nav-links">
                <li><a href="withenewtimelinept2.html">Home</a></li>
                <li><a href="quiz2.html">Quiz</a></li>
                <li><a href="community.html">Community</a></li>
                <li><a href="songpodlibrary.html">Listen</a></li>
            </ul>
        </nav>
    </header>
    
    <main>
    <div class="container">
        <div class="page-header">
            <h1>HistoriX Community</h1>
            <p>Share and discuss historical moments</p>
        </div>

        <div class="post-form">
            <textarea id="post-caption" placeholder="Share your historical discovery..."></textarea>
            <img id="image-preview" class="preview-image">
            <div class="button-group">
                <label class="file-input-label">
                    📷 Add Photo
                    <input type="file" accept="image/*" class="file-input" id="image-input">
                </label>
                <button class="submit-btn" onclick="createPost()">Post</button>
            </div>
        </div>

        <div id="posts-container"></div>
    </div>

    <script>
        // Initialize posts from localStorage or use empty array
        let posts = JSON.parse(localStorage.getItem('posts')) || [];
        let selectedImage = null;

        // Handle image selection and preview
        document.getElementById('image-input').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    selectedImage = event.target.result;
                    const preview = document.getElementById('image-preview');
                    preview.src = selectedImage;
                    preview.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        });

        // Create new post
        function createPost() {
            const caption = document.getElementById('post-caption').value;
            if (!caption && !selectedImage) return;

            const post = {
                id: Date.now(),
                user: 'Anonymous User',
                caption: caption,
                image: selectedImage,
                likes: 0,
                timestamp: new Date().toLocaleString(),
                liked: false
            };

            posts.unshift(post);
            localStorage.setItem('posts', JSON.stringify(posts));
            
            // Reset form
            document.getElementById('post-caption').value = '';
            document.getElementById('image-preview').style.display = 'none';
            selectedImage = null;
            
            displayPosts();
        }

        // Toggle like on a post
        function toggleLike(postId) {
            const post = posts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                post.likes += post.liked ? 1 : -1;
                localStorage.setItem('posts', JSON.stringify(posts));
                displayPosts();
            }
        }

        // Display all posts
        function displayPosts() {
            const container = document.getElementById('posts-container');
            container.innerHTML = posts.map(post => `
                <div class="post">
                    <div class="post-header">
                        <div class="avatar"></div>
                        <div class="post-info">
                            <div class="username">${post.user}</div>
                            <div class="timestamp">${post.timestamp}</div>
                        </div>
                    </div>
                    <div class="post-content">
                        <p>${post.caption}</p>
                        ${post.image ? `<img src="${post.image}" class="post-image" alt="Post image">` : ''}
                    </div>
                    <div class="post-actions">
                        <button class="action-btn" onclick="toggleLike(${post.id})">
                            ${post.liked ? '❤️' : '🤍'} ${post.likes}
                        </button>
                        <button class="action-btn">💬 Comment</button>
                        <button class="action-btn">↗️ Share</button>
                    </div>
                </div>
            `).join('');
        }

        // Initial display of posts
        displayPosts();
    </script>
    </div>
    </main>

    <footer>
        <div class="footer-content">
            <div class="footer-logo">
                <h3>HistoriX</h3>
                <p>Connecting Humanity Through Historical Exploration</p>
            </div>
            <div class="footer-links">
                <a href="#">About</a>
                <a href="#">Contact</a>
                <a href="#">Privacy Policy</a>
            </div>
            <div class="social-links">
                <a href="#" class="social-icon">Twitter</a>
                <a href="#" class="social-icon">LinkedIn</a>
            </div>
        </div>
        <div class="copyright">
            © 2026 HistoriX. All Rights Reserved.
        </div>
    </footer>
</body>
</html>
